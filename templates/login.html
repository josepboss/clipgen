<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In — ClipGen</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #0e0e10;
    --surface: #18181c;
    --border:  #2a2a32;
    --accent:  #7c5cfc;
    --accent2: #9b7cff;
    --text:    #f0f0f5;
    --muted:   #8888a0;
    --error:   #ff6b6b;
    --success: #4ade80;
    --radius:  12px;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .brand {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .tagline {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 32px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    width: 100%;
    max-width: 400px;
  }
  h2 {
    font-size: 1.15rem;
    font-weight: 600;
    margin-bottom: 24px;
    color: var(--text);
  }
  .field { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }
  .btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 11px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
  }
  .btn:hover { background: var(--accent2); }
  .flash {
    background: rgba(255, 107, 107, 0.12);
    border: 1px solid rgba(255, 107, 107, 0.3);
    color: var(--error);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.88rem;
    margin-bottom: 18px;
  }
  .footer-link {
    text-align: center;
    margin-top: 20px;
    font-size: 0.88rem;
    color: var(--muted);
  }
  .footer-link a { color: var(--accent2); text-decoration: none; }
  .footer-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="brand">ClipGen</div>
  <p class="tagline">YouTube → vertical clips, automatically.</p>

  <div class="card">
    <h2>Sign in to your account</h2>

    {% for msg in get_flashed_messages() %}
    <div class="flash">{{ msg }}</div>
    {% endfor %}

    <form method="post" autocomplete="on">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text"
               autocomplete="username" placeholder="your username"
               value="{{ request.form.get('username', '') }}" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password"
               autocomplete="current-password" placeholder="••••••••" required />
      </div>
      <button class="btn" type="submit">Sign In</button>
    </form>

    <div class="footer-link">
      {% if user_count == 0 %}
      No accounts yet —
      {% else %}
      Don't have an account?
      {% endif %}
      <a href="{{ url_for('register') }}">Create one</a>
    </div>
  </div>
</body>
</html>
